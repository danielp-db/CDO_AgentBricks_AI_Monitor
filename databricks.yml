bundle:
  name: finops-ai-assistant

variables:
  catalog:
    default: att_log_anomaly_catalog
    description: Unity Catalog name for FinOps data
  schema:
    default: finops_monitor
    description: Schema for FinOps tables
  warehouse_id:
    description: SQL Warehouse ID for queries
  endpoint_name:
    default: t2t-3ce36a81-endpoint
    description: Serving endpoint name for the FinOps agent

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-att-log-anomaly.cloud.databricks.com

  prod:
    workspace:
      host: https://fevm-att-log-anomaly.cloud.databricks.com
